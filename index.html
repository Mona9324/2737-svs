<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>2737 SVS 예약</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="snow"></canvas>

<header>

<h1>❄ 2737 SVS 예약</h1>

<div id="countdown"></div>

<div class="slotStats">

<span class="availableDot"></span>
<span id="availableCount">Available 0</span>

<span class="reservedDot"></span>
<span id="reservedCount">Reserved 0</span>

</div>

</header>

<div class="tabs">

<button onclick="switchBuff('monday')">월요일 (건설)</button>
<button onclick="switchBuff('tuesday')">화요일 (연구)</button>
<button onclick="switchBuff('thursday')">목요일 (훈련)</button>

</div>

<div id="slots" class="grid"></div>

<div id="modal" class="modal">

<div class="modalBox">

<h3>예약하기</h3>

<input id="alliance" placeholder="연맹명">
<input id="player" placeholder="플레이어 이름">
<input id="daysSaved" type="number" placeholder="Speed-up (days)">
<input id="password" type="password" placeholder="취소 비밀번호">

<button onclick="confirmBooking()">예약</button>
<button onclick="closeModal()">취소</button>

</div>

</div>

<button class="adminFloating" onclick="openAdmin()">⚙ Admin</button>

<div id="adminPanel" class="adminPanel">

<h3>관리자 패널</h3>

<div id="adminLogin">

<input id="adminPass" type="password" placeholder="관리자 비밀번호">
<button onclick="adminLogin()">로그인</button>

</div>

<div id="adminControls">

<button onclick="setBooking(true)">예약 열기</button>
<button onclick="setBooking(false)">예약 잠금</button>
<button onclick="clearAll()">전체 예약 삭제</button>

</div>

<button onclick="closeAdmin()">닫기</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
