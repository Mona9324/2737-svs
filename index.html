<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2737 SVS Booking</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<canvas id="snow"></canvas>

<header>

<div class="creatorBadge">
<img src="creator-dino.png" class="creatorAvatar">
<div class="creatorCredit">Mona</div>
</div>

<h1>❄ 2737 SVS Booking</h1>

<div id="countdown"></div>

<div id="rankingBox"></div>

</header>


<section class="tabsWrap">

<div class="tabs">
<button id="tab-monday" onclick="switchBuff('monday')">Monday (Construction)</button>
<button id="tab-tuesday" onclick="switchBuff('tuesday')">Tuesday (Research)</button>
<button id="tab-thursday" onclick="switchBuff('thursday')">Thursday (Troop Training)</button>
</div>

<div class="slotStats">
<span class="availableDot"></span>
<span id="availableCount">Available 0</span>

<span class="reservedDot"></span>
<span id="reservedCount">Reserved 0</span>
</div>

</section>


<main>
<div id="slots" class="grid"></div>
</main>



<!-- 예약 모달 -->

https://mona9324.github.io/2737-SvS-booking/


<!-- 예약 취소 모달 -->

<div id="cancelModal" class="modal">

<div class="modalBox">

<h3>Cancel Reservation</h3>

<input id="cancelPassword" type="password" placeholder="Password">

<button onclick="confirmCancel()">Cancel Reservation</button>

<button onclick="closeCancelModal()">Close</button>

</div>

</div>



<!-- Admin 버튼 -->

<button class="adminFloating" onclick="openAdmin()">⚙ Admin</button>



<!-- Admin 패널 -->

<div id="adminPanel" class="adminPanel">

<h3>관리자 패널</h3>

<div id="adminLogin">

<input id="adminPass" type="password" placeholder="관리자 비밀번호">

<button onclick="adminLogin()">로그인</button>

</div>


<div id="adminControls" style="display:none;">
  <button type="button" onclick="setBooking(true)">예약 열기</button>
  <button type="button" onclick="setBooking(false)">예약 잠금</button>
  <button type="button" onclick="clearAll()">전체 예약 삭제</button>
  <button type="button" onclick="exportCurrentBuffCSV()">현재 탭 CSV 내보내기</button>
  <button type="button" onclick="exportAllCSV()">전체 CSV 내보내기</button>
</div>

<button onclick="closeAdmin()">닫기</button>

</div>



<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script src="app.js"></script>

<div id="toastContainer" class="toastContainer"></div>
  
</body>
</html>
